<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Koperasi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f3f4f6;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            width:100%;
            max-width:400px;
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="login-box">

    <h3 class="text-center mb-4">
        Login Koperasi
    </h3>

    <form id="loginForm">

        <div class="mb-3">
            <label>Username</label>
            <input type="text" id="username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" id="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary w-100" id="btnLogin">
            Login
        </button>

    </form>

    <div id="alertBox" class="alert alert-danger mt-3 d-none"></div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx-3marMv2tF2rKJU8rjoOKM2vlaeUK5uUAwY2mU_FukuX-sRMsIya9eqxLKS7n_jB1/exec";

// kalau sudah login
if(sessionStorage.getItem("activeUser")){
    window.location.href = "home.html";
}

document.getElementById("loginForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    const btn = document.getElementById("btnLogin");
    const alertBox = document.getElementById("alertBox");

    btn.disabled = true;
    btn.innerText = "Loading...";

    try{

        const response = await fetch(SCRIPT_URL + "?action=login", {
            method:"POST",
            body:JSON.stringify({
                username:user,
                password:pass
            })
        });

        const result = await response.json();

        console.log(result);

        if(result.success){

            sessionStorage.setItem("activeUser", user);

            window.location.href = "home.html";

        }else{

            alertBox.innerText = result.message || "Login gagal";
            alertBox.classList.remove("d-none");

        }

    }catch(err){

        console.log(err);

        alertBox.innerText = "Server gagal dihubungi";
        alertBox.classList.remove("d-none");

    }

    btn.disabled = false;
    btn.innerText = "Login";

});

</script>

</body>
</html>
