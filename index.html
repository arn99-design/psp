<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Keuangan PERMATA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-box { max-width: 400px; width: 100%; padding: 2rem; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="login-box">
        <h3 class="text-center mb-4 fw-bold text-primary">Login PERMATA</h3>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" class="form-control" id="username" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold" id="btnLogin">Masuk</button>
        </form>
        <div id="loginAlert" class="alert alert-danger mt-3 d-none" style="font-size: 0.9rem;"></div>
    </div>

    <script>
        // MASUKKAN URL APPS SCRIPT ANDA DI SINI
        const SCRIPT_URL = "URL_APPS_SCRIPT_ANDA"; 

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const alertBox = document.getElementById('loginAlert');
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            btn.innerText = "Memeriksa..."; btn.disabled = true; alertBox.classList.add('d-none');

            try {
                const response = await fetch(SCRIPT_URL + "?action=login", {
                    method: "POST",
                    body: JSON.stringify({ username: user, password: pass })
                });
                const result = await response.json();

                if (result.success) {
                    // Simpan sesi ke browser
                    sessionStorage.setItem("activeUser", result.username);
                    sessionStorage.setItem("userRole", result.role);
                    window.location.href = "home.html"; // Arahkan ke dashboard
                } else {
                    alertBox.innerText = result.message;
                    alertBox.classList.remove('d-none');
                }
            } catch (err) {
                alertBox.innerText = "Gagal terhubung ke server.";
                alertBox.classList.remove('d-none');
            } finally {
                btn.innerText = "Masuk"; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
